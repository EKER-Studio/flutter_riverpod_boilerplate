name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Cache Build Runner / native artifacts
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: dart-tool-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            dart-tool-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localization files (i18n)
        run: flutter gen-l10n

      - name: Run code generation (Build Runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze

      - name: Run unit and widget tests
        run: flutter test -j 1